<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" /> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Theme script to prevent flash -->
  <script>
    (function () {
      const savedTheme = localStorage.getItem('theme');
      const systemPrefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = savedTheme ? savedTheme : (systemPrefersDark ? 'dark' : 'light');
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
        document.documentElement.classList.remove('light');
      } else {
        document.documentElement.classList.add('light');
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>
  <!-- SEO Meta Tags -->
  <title>Practice CAD — Observe, Solve, Climb the Leaderboard</title>
  <meta name="description"
    content="Practice CAD is a competitive visual speed solving platform. Test your pattern observation skills, zoom into high-res images, beat the timer, and claim your place in the global hall of fame." />
  <meta name="keywords"
    content="quizzes, competitive quiz, visual speed solving, leaderboard, badges, pattern recognition" />
  <meta name="author" content="Practice CAD Team" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
</head>

</body>

</html>
